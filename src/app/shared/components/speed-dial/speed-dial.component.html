  class="speed-dial-container"
  (mouseenter)="isOpen = true"
  (mouseleave)="isOpen = false"

    </a>

    <!-- Hotline -->
    <a
      href="tel:1900xxxx"
      class="dial-item hotline"
      nz-tooltip
      nzTooltipTitle="Hotline: 1900 xxxx"
      nzTooltipPlacement="left"
    >
      <nz-icon nzType="phone" nzTheme="outline" />
    </a>
  </div>

  <button class="main-fab" [class.open]="isOpen" (click)="toggle()">
    <nz-icon
      [nzType]="isOpen ? 'close' : 'customer-service'"
      nzTheme="outline"
    />
  </button>
</div>
