<div class="modern-quantity-wrapper">
  <button type="button" class="qty-btn" (click)="decrease()" [disabled]="quantity <= 1">
    <nz-icon nzType="minus" />
  </button>
  <input 
    type="number" 
    class="qty-input" 
    [ngModel]="quantity" 
    (ngModelChange)="onInputChange($event)"
    (blur)="onBlur()"
    [min]="1" 
    [max]="maxStock"
  />
  <button type="button" class="qty-btn" (click)="increase()" [disabled]="quantity >= maxStock">
    <nz-icon nzType="plus" />
  </button>
</div>
