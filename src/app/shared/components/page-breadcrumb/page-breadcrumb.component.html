<nav class="breadcrumb-nav" aria-label="Breadcrumb">
  <ol class="breadcrumb-list">
    <li class="breadcrumb-item" *ngFor="let item of items; let i = index; let last = last">
      <!-- Home icon for first item -->
      <span class="home-icon" *ngIf="i === 0" aria-hidden="true" [routerLink]="item.url" [queryParams]="item.queryParams" style="cursor: pointer;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
      </span>

      <!-- Separator chevron (not before first item) -->
      <span class="breadcrumb-separator" *ngIf="i > 0" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </span>

      <!-- Link item -->
      <a
        *ngIf="!last && item.url && i > 0"
        [routerLink]="item.url"
        [queryParams]="item.queryParams"
        class="breadcrumb-link"
      >{{ item.label }}</a>

      <!-- Active / last item (no link) -->
      <span
        *ngIf="last || !item.url"
        [class.breadcrumb-current]="last"
        [class.breadcrumb-link]="!last && !item.url"
        [attr.aria-current]="last ? 'page' : null"
      >{{ item.label }}</span>
    </li>
  </ol>
</nav>
