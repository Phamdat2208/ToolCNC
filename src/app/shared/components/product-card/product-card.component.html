<nz-card
  nzHoverable
  [nzCover]="coverTemplate"
  [routerLink]="['/products', product.id]"
  class="hover-glow"
  appScrollReveal
>
  <nz-card-meta
    [nzTitle]="product.name"
    [nzDescription]="priceTemplate"
  ></nz-card-meta>
  <div class="card-actions">
    <div class="action-row">
      <!-- Thêm vào giỏ hàng -->
      <button
        nz-button
        nzType="primary"
        nzBlock
        nz-tooltip
        nzTooltipTitle="Thêm vào giỏ hàng"
        (click)="$event.stopPropagation(); addToCart(product)"
        class="btn-cart"
      >
        <nz-icon nzType="shopping-cart" />
      </button>

      <!-- Yêu thích -->
      <button
        nz-button
        [nzType]="
          wishlistService.isWishlisted(product.id) ? 'primary' : 'default'
        "
        [nzDanger]="wishlistService.isWishlisted(product.id)"
        nz-tooltip
        [nzTooltipTitle]="
          wishlistService.isWishlisted(product.id)
            ? 'Xóa khỏi yêu thích'
            : 'Thêm vào yêu thích'
        "
        (click)="$event.stopPropagation(); toggleWishlist(product)"
        class="btn-wishlist"
      >
        <nz-icon
          [nzType]="
            wishlistService.isWishlisted(product.id) ? 'heart' : 'heart'
          "
          [nzTheme]="
            wishlistService.isWishlisted(product.id) ? 'fill' : 'outline'
          "
        />
      </button>
    </div>
  </div>
</nz-card>

<ng-template #coverTemplate>
  <div class="product-cover">
    <img [alt]="product.name" [src]="product.img" />
  </div>
</ng-template>

<ng-template #priceTemplate>
  <span class="product-price">{{
    product.price | currency: "VND" : "symbol"
  }}</span>
</ng-template>
