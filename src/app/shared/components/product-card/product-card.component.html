<div class="modern-product-card" [routerLink]="['/products', product.id]" appScrollReveal>
  <!-- Image Box -->
  <div class="product-img-box img-wrapper-relative">
    <img [alt]="product.name" [src]="imageUrl" [class.img-out-of-stock]="product.totalStock === 0" loading="lazy" />
    <div class="out-of-stock-banner" *ngIf="product.totalStock === 0">Hết Hàng</div>
    
    <!-- Hover Actions Overlay -->
    <div class="card-overlay-actions">
      <!-- Heart Button -->
      <button nz-button nzShape="circle" class="btn-overlay-wishlist"
              [class.wishlisted]="wishlistService.isWishlisted(product.id)"
              (click)="$event.stopPropagation(); toggleWishlist(product)"
              nz-tooltip [nzTooltipTitle]="wishlistService.isWishlisted(product.id) ? 'Xóa khỏi yêu thích' : 'Thêm vào yêu thích'">
         <nz-icon [nzType]="'heart'" [nzTheme]="wishlistService.isWishlisted(product.id) ? 'fill' : 'outline'" />
      </button>
    </div>
  </div>

  <!-- Content Box -->
  <div class="product-info-box">
    <h3 class="product-title" [title]="product.name">{{ product.name }}</h3>
    
    <div class="product-price-row">
      <div class="price-display-wrapper">
        <ng-container *ngIf="product.hasVariants && product.minPrice !== product.maxPrice; else singlePrice">
          <span class="product-price range-price">
            {{ product.minPrice | currency: "VND" : "" }} - {{ product.maxPrice | currency: "VND" : "symbol" }}
          </span>
        </ng-container>
        <ng-template #singlePrice>
          <span class="product-price">{{ product.price | currency: "VND" : "symbol" }}</span>
        </ng-template>
      </div>
      
      <!-- Cart Button Bottom Right -->
      <button
        nz-button
        nzType="primary"
        nzShape="circle"
        class="btn-cart-modern"
        nz-tooltip
        nzTooltipTitle="Thêm vào giỏ hàng"
        [disabled]="product.totalStock === 0"
        [nzLoading]="isAddingToCart"
        (click)="$event.stopPropagation(); addToCart(product)"
      >
        <nz-icon nzType="shopping-cart" *ngIf="!isAddingToCart" />
      </button>
    </div>
  </div>
</div>
