<div class="register-container">
  <button
    nz-button
    class="back-button"
    nzType="default"
    nzShape="circle"
    routerLink="/"
  >
    <nz-icon nzType="arrow-left" />
  </button>
  <div class="register-box">
    <div class="register-header">
      <h2>Đăng ký Tài khoản</h2>
      <p>Điền thông tin của bạn để tạo tài khoản mới</p>
    </div>

    <form
      nz-form
      [formGroup]="registerForm"
      class="register-form"
      (ngSubmit)="submitForm()"
    >
      <nz-form-item>
        <nz-form-control
          nzErrorTip="Vui lòng nhập tên đăng nhập dài hơn 4 ký tự!"
        >
          <nz-input-group nzPrefixIcon="user">
            <input
              type="text"
              nz-input
              formControlName="username"
              placeholder="Tên đăng nhập"
            />
          </nz-input-group>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-control nzErrorTip="Vui lòng nhập Email hợp lệ!">
          <nz-input-group nzPrefixIcon="mail">
            <input
              type="email"
              nz-input
              formControlName="email"
              placeholder="Email (abc@gmail.com)"
            />
          </nz-input-group>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-control nzErrorTip="Vui lòng nhập mật khẩu dài hơn 6 ký tự!">
          <nz-input-group nzPrefixIcon="lock" [nzSuffix]="suffixTemplate">
            <input
              [type]="passwordVisible ? 'text' : 'password'"
              nz-input
              formControlName="password"
              placeholder="Mật khẩu"
              (ngModelChange)="updateConfirmValidator()"
            />
          </nz-input-group>
          <ng-template #suffixTemplate>
            <nz-icon
              [nzType]="passwordVisible ? 'eye-invisible' : 'eye'"
              (click)="passwordVisible = !passwordVisible"
              class="password-toggle"
            />
          </ng-template>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-control [nzErrorTip]="errorTpl">
          <nz-input-group
            nzPrefixIcon="lock"
            [nzSuffix]="suffixTemplateConfirm"
          >
            <input
              [type]="confirmPasswordVisible ? 'text' : 'password'"
              nz-input
              formControlName="confirmPassword"
              placeholder="Nhập lại Mật khẩu"
            />
          </nz-input-group>
          <ng-template #suffixTemplateConfirm>
            <nz-icon
              [nzType]="confirmPasswordVisible ? 'eye-invisible' : 'eye'"
              (click)="confirmPasswordVisible = !confirmPasswordVisible"
              class="password-toggle"
            />
          </ng-template>
          <ng-template #errorTpl let-control>
            <ng-container *ngIf="control.hasError('required')"
              >Vui lòng xác nhận mật khẩu!</ng-container
            >
            <ng-container *ngIf="control.hasError('confirm')"
              >Hai mật khẩu không khớp!</ng-container
            >
          </ng-template>
        </nz-form-control>
      </nz-form-item>

      <button
        nz-button
        class="register-form-button register-form-margin"
        [nzType]="'primary'"
        [nzLoading]="isLoading"
        nzBlock
      >
        Tạo tài khoản
      </button>

      <div class="register-footer">
        Đã có tài khoản? <a routerLink="/login">Đăng nhập</a>
      </div>
    </form>
  </div>
</div>
