<div class="login-container">
  <button
    nz-button
    class="back-button"
    nzType="default"
    nzShape="circle"
    routerLink="/"
  >
    <nz-icon nzType="arrow-left" />
  </button>
  <div class="login-box">
    <div class="brand-logo-container">
      <img src="Logo.ico" alt="Logo" class="auth-logo" />
      <div class="brand-text">
        <span class="text-primary">Tool</span><span class="text-danger">CNC</span>
      </div>
    </div>
    
    <div class="login-header">
      <h2>Đăng nhập Hệ thống</h2>
      <p>Nhập tên tài khoản và mật khẩu để tiếp tục</p>
    </div>

    <div class="brand-decoration">
      <div class="deco-circle deco-1"></div>
      <div class="deco-circle deco-2"></div>
      <div class="deco-circle deco-3"></div>
    </div>
  </div>

  <div class="form-panel">
    <div class="form-card">
      <a routerLink="/" class="mobile-back-link">
        <nz-icon nzType="arrow-left" /> Về trang chủ
      </a>
      <div class="form-header">
        <div class="form-icon-badge">
          <nz-icon nzType="user" />
        </div>
        <h2 class="form-title">Đăng nhập</h2>
        <p class="form-subtitle">Chào mừng trở lại! Vui lòng đăng nhập để tiếp tục.</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="submitForm()" class="auth-form">

        <div class="field-group">
          <label class="field-label">Tên đăng nhập</label>
          <app-custom-input
            formControlName="username"
            placeholder="Nhập tên đăng nhập"
            prefixIcon="user"
            errorTip="Vui lòng nhập tên đăng nhập!"
          ></app-custom-input>
        </div>

        <div class="field-group">
          <label class="field-label">Mật khẩu</label>
          <app-custom-input
            formControlName="password"
            type="password"
            placeholder="Nhập mật khẩu"
            prefixIcon="lock"
            errorTip="Vui lòng nhập mật khẩu!"
          ></app-custom-input>
        </div>

        <div class="form-options">
          <label class="remember-check">
            <input type="checkbox" formControlName="remember" />
            <span>Ghi nhớ đăng nhập</span>
          </label>
          <a class="forgot-link">Quên mật khẩu?</a>
        </div>

        <button
          nz-button
          nzType="primary"
          nzBlock
          [nzLoading]="isLoading"
          class="submit-btn"
        >
          <nz-icon nzType="login" *ngIf="!isLoading" />
          Đăng nhập
        </button>

        <div class="form-switch">
          Chưa có tài khoản?
          <a routerLink="/register" class="switch-link">Đăng ký ngay</a>
        </div>
      </form>
    </div>
  </div>

</div>
