<div class="catalog-container">
  <app-page-breadcrumb [items]="breadcrumbItems"></app-page-breadcrumb>

  <div nz-row nzGutter="24">
    <!-- Sidebar / Filters -->
    <div nz-col nzXs="24" nzMd="6" class="filters-sidebar">
      <div class="filter-group">
        <h3>Danh mục sản phẩm</h3>
        <ul nz-menu nzMode="inline" class="category-menu">
          <!-- Option All -->
          <li
            nz-menu-item
            [nzSelected]="activeCategory === ''"
            [routerLink]="['/products']"
            [queryParams]="{}"
          >
            <span class="cat-item-row">
              <span class="cat-name">Tất cả sản phẩm</span>
              <span class="count-badge">{{ totalAllProducts }}</span>
            </span>
          </li>

          <li
            nz-menu-item
            *ngFor="let cat of categories"
            [nzSelected]="cat.name === activeCategory"
            [routerLink]="['/products']"
            [queryParams]="{ category: cat.name }"
          >
            <span class="cat-item-row">
              <span class="cat-name">{{ cat.name }}</span>
              <span class="count-badge">{{ cat.productCount }}</span>
            </span>
          </li>
        </ul>
      </div>

      <div class="filter-group">
        <h3>Khoảng giá (VND)</h3>
        <nz-slider
          nzRange
          [nzMin]="0"
          [nzMax]="2000000000"
          [nzStep]="1000000"
          [(ngModel)]="priceRange"
        ></nz-slider>
        <div class="price-inputs">
          <input
            nz-input
            type="number"
            [ngModel]="priceRange[0]"
            (ngModelChange)="priceRange = [$event, priceRange[1]]"
            placeholder="Từ"
          />
          <span> - </span>
          <input
            nz-input
            type="number"
            [ngModel]="priceRange[1]"
            (ngModelChange)="priceRange = [priceRange[0], $event]"
            placeholder="Đến"
          />
        </div>
      </div>

      <div class="filter-group">
        <h3>Thương hiệu</h3>
        <div class="brand-filters">
          <ng-container *ngFor="let brand of knownBrands">
            <label
              nz-checkbox
              [nzChecked]="selectedBrands.has(brand)"
              (nzCheckedChange)="toggleBrand(brand, $event)"
              >{{ brand }}</label
            ><br />
          </ng-container>
        </div>
      </div>

      <button nz-button nzType="primary" nzBlock (click)="applyFilters()">
        Lọc kết quả
      </button>
    </div>

    <!-- Product Grid -->
    <div nz-col nzXs="24" nzMd="18">
      <div class="catalog-header">
        <h2>
          <ng-container *ngIf="searchKeyword"
            >Kết quả cho "<em>{{ searchKeyword }}</em
            >"</ng-container
          >
          <ng-container *ngIf="!searchKeyword">Tất cả sản phẩm</ng-container>
        </h2>
        <div class="catalog-sort">
          <span>Sắp xếp theo: </span>
          <button
            nz-button
            nzType="text"
            nz-dropdown
            [nzDropdownMenu]="sortMenu"
            nzPlacement="bottomRight"
          >
            {{ currentSort }} <nz-icon nzType="down" />
          </button>
          <nz-dropdown-menu #sortMenu="nzDropdownMenu">
            <ul nz-menu>
              <li nz-menu-item (click)="changeSort('Mới nhất')">Mới nhất</li>
              <li nz-menu-item (click)="changeSort('Giá: Thấp đến Cao')">
                Giá: Thấp đến Cao
              </li>
              <li nz-menu-item (click)="changeSort('Giá: Cao đến Thấp')">
                Giá: Cao đến Thấp
              </li>
              <li nz-menu-item (click)="changeSort('Bán chạy nhất')">
                Bán chạy nhất
              </li>
            </ul>
          </nz-dropdown-menu>
        </div>
      </div>

      <nz-spin [nzSpinning]="loading">
        <div nz-row [nzGutter]="[16, 16]">
          <div
            nz-col
            nzXs="24"
            nzSm="12"
            nzLg="8"
            *ngFor="let product of products"
          >
            <app-product-card [product]="product"></app-product-card>
          </div>
        </div>

        <!-- Trạng thái trống -->
        <div
          *ngIf="!loading && products.length === 0"
          class="empty-state-container mt-24"
        >
          <nz-empty
            nzNotFoundContent="Không tìm thấy sản phẩm nào phù hợp với yêu cầu của bạn."
          ></nz-empty>
        </div>

        <div class="pagination-wrapper" *ngIf="totalProducts > 0">
          <nz-pagination
            [(nzPageIndex)]="pageIndex"
            [nzTotal]="totalProducts"
            [nzPageSize]="pageSize"
            (nzPageIndexChange)="changePage($event)"
          ></nz-pagination>
        </div>
      </nz-spin>
    </div>
  </div>
</div>
