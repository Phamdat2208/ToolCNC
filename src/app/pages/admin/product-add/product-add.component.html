<div class="product-add-container">
  <h2>{{ isEditMode ? "Sửa Sản Phẩm" : "Thêm Sản Phẩm Mới" }}</h2>

  <nz-radio-group
    *ngIf="!isEditMode"
    [(ngModel)]="addMode"
    class="mode-selector"
  >
    <label nz-radio-button nzValue="single">Thêm Đơn Lẻ</label>
    <label nz-radio-button nzValue="bulk">Thêm Hàng Loạt (JSON)</label>
  </nz-radio-group>

  <div class="form-wrapper">
    <!-- Single Product Form -->
    <form
      *ngIf="addMode === 'single'"
      nz-form
      [formGroup]="productForm"
      (ngSubmit)="submitSingle()"
      nzLayout="vertical"
    >
      <nz-form-item>
        <nz-form-label nzRequired>Tên sản phẩm</nz-form-label>
        <nz-form-control nzErrorTip="Vui lòng nhập tên sản phẩm">
          <input
            nz-input
            formControlName="name"
            placeholder="Ví dụ: Máy phay đo lường CNC..."
          />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label nzRequired>Giá (VND)</nz-form-label>
        <nz-form-control nzErrorTip="Vui lòng nhập giá trị lớn hơn 0">
          <nz-input-number
            formControlName="price"
            [nzMin]="0"
            [nzStep]="100000"
            style="width: 100%"
          ></nz-input-number>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label nzRequired>Thương hiệu</nz-form-label>
        <nz-form-control nzErrorTip="Vui lòng nhập thương hiệu">
          <input
            nz-input
            formControlName="brand"
            placeholder="Ví dụ: Mazak, Hitachi..."
          />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label>Mô tả chi tiết</nz-form-label>
        <nz-form-control>
          <textarea nz-input formControlName="description" rows="4"></textarea>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label>Hình ảnh (URL)</nz-form-label>
        <nz-form-control>
          <input
            nz-input
            formControlName="imageUrl"
            placeholder="https://placehold.co/..."
          />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-control>
          <button
            nz-button
            nzType="primary"
            nzSize="large"
            [nzLoading]="isSubmitting"
            style="width: 200px"
          >
            {{ isEditMode ? "Cập nhật" : "Lưu sản phẩm" }}
          </button>
        </nz-form-control>
      </nz-form-item>
    </form>

    <!-- Bulk Product Form -->
    <div *ngIf="addMode === 'bulk'" class="bulk-section">
      <p style="margin-bottom: 16px">
        Vui lòng dán danh sách chứa mảng (Array) các đối tượng JSON của sản
        phẩm. Mỗi đối tượng cần có `name`, `price`, `brand`.
      </p>
      <textarea
        nz-input
        [(ngModel)]="bulkJson"
        rows="15"
        placeholder='[
  { 
    "name": "Sản phẩm 1",
    "price": 500000,
    "brand": "Makita"
  },
  { 
    "name": "Sản phẩm 2",
    "price": 1200000,
    "brand": "Bosch"
  }
]'
        style="font-family: monospace"
      ></textarea>

      <button
        nz-button
        nzType="primary"
        nzSize="large"
        [nzLoading]="isSubmitting"
        style="margin-top: 24px"
        (click)="submitBulk()"
      >
        Thực thi nhập JSON
      </button>
    </div>
  </div>
</div>
