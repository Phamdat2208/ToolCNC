<div class="product-add-container">
  <h2>{{ isEditMode ? "Sửa Sản Phẩm" : "Thêm Sản Phẩm Mới" }}</h2>

  <!-- Màn hình Sửa: Hiển thị ngay Form đơn -->
  <div class="form-wrapper" *ngIf="isEditMode">
    <ng-container *ngTemplateOutlet="singleForm"></ng-container>
  </div>

  <!-- Màn hình Thêm Mới: Hiển thị dạng Tabs -->
  <nz-tabset *ngIf="!isEditMode">
    <nz-tab nzTitle="Thêm Đơn Lẻ">
      <div class="form-wrapper" style="padding-top: 16px">
        <ng-container *ngTemplateOutlet="singleForm"></ng-container>
      </div>
    </nz-tab>
    <nz-tab nzTitle="Thêm Hàng Loạt (JSON)">
      <div class="form-wrapper" style="padding-top: 16px">
        <ng-container *ngTemplateOutlet="bulkForm"></ng-container>
      </div>
    </nz-tab>
  </nz-tabset>

  <ng-template #singleForm>
    <form
      nz-form
      [formGroup]="productForm"
      (ngSubmit)="submitSingle()"
      nzLayout="vertical"
    >
      <nz-form-item>
        <nz-form-label nzRequired>Tên sản phẩm</nz-form-label>
        <nz-form-control nzErrorTip="Vui lòng nhập tên sản phẩm">
          <input
            nz-input
            formControlName="name"
            placeholder="Ví dụ: Máy phay đo lường CNC..."
          />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label nzRequired>Giá (VND)</nz-form-label>
        <nz-form-control nzErrorTip="Vui lòng nhập giá trị lớn hơn 0">
          <nz-input-number
            formControlName="price"
            [nzMin]="0"
            [nzStep]="100000"
            style="width: 100%"
          ></nz-input-number>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label nzRequired>Thương hiệu</nz-form-label>
        <nz-form-control nzErrorTip="Vui lòng nhập thương hiệu">
          <input
            nz-input
            formControlName="brand"
            placeholder="Ví dụ: Mazak, Hitachi..."
          />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label>Mô tả chi tiết</nz-form-label>
        <nz-form-control>
          <textarea nz-input formControlName="description" rows="4"></textarea>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label>Hình ảnh (URL)</nz-form-label>
        <nz-form-control>
          <input
            nz-input
            formControlName="imageUrl"
            placeholder="https://placehold.co/..."
          />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-control>
          <div style="display: flex; gap: 12px">
            <button
              nz-button
              nzType="primary"
              nzSize="large"
              [nzLoading]="isSubmitting"
              style="width: 200px"
            >
              {{ isEditMode ? "Cập nhật" : "Lưu sản phẩm" }}
            </button>
            <button
              *ngIf="isEditMode"
              nz-button
              nzType="primary"
              nzDanger
              nzSize="large"
              style="width: 200px"
              (click)="back()"
            >
              Hủy bỏ
            </button>
          </div>
        </nz-form-control>
      </nz-form-item>
    </form>
  </ng-template>

  <ng-template #bulkForm>
    <div class="bulk-section">
      <p style="margin-bottom: 16px">
        Vui lòng dán danh sách chứa mảng (Array) các đối tượng JSON của sản
        phẩm. Mỗi đối tượng cần có `name`, `price`, `brand`.
      </p>
      <textarea
        nz-input
        [(ngModel)]="bulkJson"
        rows="15"
        placeholder='[
  { 
    "name": "Sản phẩm 1",
    "price": 500000,
    "brand": "Makita"
  },
  { 
    "name": "Sản phẩm 2",
    "price": 1200000,
    "brand": "Bosch"
  }
]'
        style="font-family: monospace"
      ></textarea>

      <button
        nz-button
        nzType="primary"
        nzSize="large"
        [nzLoading]="isSubmitting"
        style="margin-top: 24px"
        (click)="submitBulk()"
      >
        Thực thi nhập JSON
      </button>
    </div>
  </ng-template>
</div>
