    <div class="admin-products-container">
      <div class="page-header">
        <h2>Quản lý sản phẩm</h2>
        <button nz-button nzType="primary" routerLink="/admin/products/new">
          <nz-icon nzType="plus" /> Thêm sản phẩm mới
        </button>
      </div>

      <div class="search-bar">
        <nz-input-group [nzPrefix]="prefixIconSearch">
          <input type="text" nz-input placeholder="Tìm kiếm theo tên sản phẩm..." [(ngModel)]="searchKeyword" (ngModelChange)="loadProducts(true)" />
        </nz-input-group>
        <ng-template #prefixIconSearch><nz-icon nzType="search" /></ng-template>
      </div>

      <nz-table
        #basicTable
        [nzData]="products"
        [nzLoading]="loading"
        [nzTotal]="total"
        [nzPageIndex]="page"
        [nzPageSize]="size"
        [nzFrontPagination]="false"
        (nzPageIndexChange)="onPageIndexChange($event)"
        [nzScroll]="{ x: '1000px' }"
      >
        <thead>
          <tr>
            <th nzWidth="80px">ID</th>
            <th nzWidth="100px">Ảnh</th>
            <th>Tên sản phẩm</th>
            <th>Danh mục</th>
            <th>Thương hiệu</th>
            <th>Tồn kho</th>
            <th>Giá</th>
            <th nzWidth="150px">Thao tác</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let data of basicTable.data">
            <td>{{ data.id }}</td>
            <td>
              <div class="img-wrapper-relative" style="width: 50px; height: 50px; border-radius: 4px;">
                <img [src]="data.imageUrl || 'https://placehold.co/50x50'" [alt]="data.name" [class.img-out-of-stock]="data.stock === 0" style="width: 50px; height: 50px; object-fit: cover; border-radius: 4px;" />
                <div class="out-of-stock-banner" *ngIf="data.stock === 0" style="font-size: 6px; padding: 1px 4px; border: 1px solid white;">HẾT</div>
              </div>
            </td>
            <td class="font-bold">{{ data.name }}</td>
            <td><nz-tag>{{ data.category?.name || data.category }}</nz-tag></td>
            <td>{{ data.brand }}</td>
            <td>
              <nz-tag [nzColor]="data.stock > 0 ? 'green' : 'red'">{{ data.stock }}</nz-tag>
            </td>
            <td class="text-danger font-bold">{{ data.price | currency:'VND':'symbol':'1.0-0' }}</td>
            <td>
              <button nz-button nzType="text" [routerLink]="['/admin/products', data.id, 'edit']" class="text-primary" nz-tooltip nzTooltipTitle="Sửa">
                <nz-icon nzType="edit" />
              </button>
              <button nz-button nzType="text" nzDanger (click)="deleteProduct(data.id)" nz-tooltip nzTooltipTitle="Xóa">
                <nz-icon nzType="delete" />
              </button>
            </td>
          </tr>
        </tbody>
      </nz-table>
    </div>
