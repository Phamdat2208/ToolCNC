    <div class="admin-users-container">
      <h2 class="page-title">Quản lý người dùng</h2>
      
      <nz-table 
    #usersTable 
    [nzData]="users.slice((page - 1) * size, page * size)" 
    [nzLoading]="loading" 
    [nzScroll]="{ x: '800px' }"
    [nzFrontPagination]="false"
    [nzShowPagination]="false"
  >
        <thead>
          <tr>
            <th>Người dùng</th>
            <th>Email / Username</th>
            <th>Họ tên</th>
            <th>Quyền hạn</th>
            <th>Trạng thái</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let user of usersTable.data">
            <td>
              <nz-avatar nzIcon="user" [nzSrc]="user.avatarUrl"></nz-avatar>
            </td>
            <td>
              <div class="font-bold">{{ user.username }}</div>
              <small class="text-secondary">{{ user.email }}</small>
            </td>
            <td>{{ user.fullName || '---' }}</td>
            <td>
              <nz-tag [nzColor]="user.role === 'ADMIN' ? 'gold' : 'blue'">
                {{ user.role }}
              </nz-tag>
            </td>
            <td>
              <nz-tag [nzColor]="'success'">Hoạt động</nz-tag>
            </td>
          </tr>
        </tbody>
      </nz-table>

      <div class="pagination-container mt-16" *ngIf="users.length > 0">
        <app-pagination
          [total]="users.length"
          [pageIndex]="page"
          [pageSize]="size"
          [pageSizeOptions]="[10, 20, 50, 100]"
          (pageIndexChange)="onPageChange($event)"
          (pageSizeChange)="onPageSizeChange($event)"
        ></app-pagination>
      </div>
    </div>
