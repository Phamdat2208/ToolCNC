<div class="profile-container">
  <h2><nz-icon nzType="user" /> Quản lý Tài khoản</h2>

  <div class="tab-content" *ngIf="!isLoadingProfile; else loadingTemplate">
    <h3 class="section-title">Thông tin cá nhân</h3>
    <table class="info-table">
      <tbody>
        <tr>
          <td class="info-label">Tên Đăng Nhập</td>
          <td class="info-value">{{ userInfo?.username }}</td>
        </tr>
        <tr>
          <td class="info-label">Email</td>
          <td class="info-value">{{ userInfo?.email || 'Chưa cập nhật' }}</td>
        </tr>
        <tr>
          <td class="info-label">Quyền hạn</td>
          <td class="info-value role-badge">{{ userInfo?.role }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <ng-template #loadingTemplate>
    <div class="loading-state">
      <nz-spin nzSimple nzSize="large"></nz-spin>
    </div>
  </ng-template>
</div>
